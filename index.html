<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BI SOP 作業流程指引</title>
<style>
:root {
  --bg:#f7f8fc; --card:#ffffff; --border:#e2e8f0;
  --text:#1a202c; --sub:#718096;
  --accent:#3182ce;
  --green:#276749; --green-bg:#f0fff4; --green-border:#9ae6b4;
  --red:#c53030; --red-bg:#fff5f5; --red-border:#fc8181;
  --yellow:#d69e2e; --yellow-bg:#fffff0; --yellow-border:#f6e05e;
  --c-fi:#dd6b20; --c-bl:#3182ce; --c-fz:#e53e3e; --c-bu:#38a169; --c-tr:#805ad5;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;min-height:100vh}

/* ── Header ── */
.header{background:#2d3748;color:#e2e8f0;padding:14px 20px 0;border-bottom:1px solid #e2e8f0}
.header-top{display:flex;align-items:center;justify-content:space-between;padding-bottom:12px}
.header h1{font-size:16px;font-weight:700}
.header p{font-size:11px;color:#4a5568;margin-top:2px}
.tab-bar{display:flex;gap:4px}
.tab-btn{padding:6px 16px;border:none;border-radius:6px 6px 0 0;font-size:13px;font-weight:600;cursor:pointer;background:transparent;color:#4a5568;transition:all .15s}
.tab-btn.active{background:var(--bg);color:var(--text)}
.tab-btn:hover:not(.active){background:#e2e8f0;color:#4a5568}

/* ── Shared ── */
.view{display:none}.view.active{display:block}

/* ══════════════ CHECKLIST VIEW ══════════════ */
.container{max-width:720px;margin:0 auto;padding:20px 16px 40px}
.progress-wrap{background:var(--card);border-radius:10px;padding:14px 18px;margin-bottom:18px;border:1px solid var(--border);display:flex;align-items:center;gap:14px}
.progress-bar-bg{flex:1;height:8px;background:#e2e8f0;border-radius:4px;overflow:hidden}
.progress-bar{height:100%;background:var(--accent);border-radius:4px;transition:width .4s}
.progress-text{font-size:12px;color:var(--sub);white-space:nowrap}
.module{background:var(--card);border-radius:12px;border:1px solid var(--border);margin-bottom:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.4)}
.module-header{display:flex;align-items:center;padding:14px 18px;cursor:pointer;gap:12px;user-select:none;transition:background .15s}
.module-header:hover{background:#f0f4f8}
.module-icon{font-size:20px;flex-shrink:0}
.module-title{flex:1}
.module-title h2{font-size:14px;font-weight:700;color:var(--text)}
.module-title span{font-size:12px;color:var(--sub)}
.module-arrow{font-size:12px;color:var(--sub);transition:transform .25s}
.module.open .module-arrow{transform:rotate(180deg)}
.module-badge{background:#e2e8f0;color:var(--sub);font-size:11px;font-weight:700;padding:2px 8px;border-radius:99px}
.module-done .module-badge{background:var(--green-bg);color:var(--green)}
.steps{display:none;border-top:1px solid var(--border)}
.module.open .steps{display:block}
.step{padding:14px 18px;border-bottom:1px solid #e2e8f0;display:flex;gap:12px;align-items:flex-start;transition:background .15s}
.step:last-child{border-bottom:none}
.step.checked{background:#f0fff4}
.step-check{width:22px;height:22px;border:2px solid #cbd5e0;border-radius:6px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .15s;margin-top:1px}
.step.checked .step-check{background:var(--green);border-color:var(--green);color:#fff}
.step-body{flex:1;min-width:0}
.step-head{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;cursor:pointer}
.step-num{background:#e2e8f0;color:#718096;font-size:11px;font-weight:700;padding:1px 7px;border-radius:4px}
.step-name{font-size:13px;font-weight:700;color:var(--text)}
.step-detail{display:none;margin-top:8px}
.step.expanded .step-detail{display:block}
.detail-row{font-size:12px;margin-bottom:5px;line-height:1.6;display:flex;gap:6px;color:#4a5568}
.detail-lbl{font-weight:700;flex-shrink:0;white-space:nowrap}
.lbl-r{color:var(--red)}.lbl-g{color:var(--green)}
.kw-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.kw{background:#ebf4ff;color:var(--accent);border-radius:4px;padding:1px 7px;font-size:11px}
.expand-btn{font-size:11px;color:var(--accent);cursor:pointer;margin-top:4px;display:inline-block}
.expand-btn:hover{text-decoration:underline}
.toggle-all-btn{flex:1;padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--card);font-size:12px;font-weight:600;cursor:pointer;color:#4a5568;transition:all .15s}
.toggle-all-btn:hover{background:#e2e8f0;color:var(--text)}
.reset-btn{display:block;width:100%;margin-top:16px;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--card);font-size:13px;cursor:pointer;color:var(--sub)}
.reset-btn:hover{background:#f0f4f8}

/* ══════════════ FLOWCHART VIEW ══════════════ */
.fc-wrap{max-width:560px;margin:0 auto;padding:24px 16px 48px;display:flex;flex-direction:column;align-items:center}

/* nodes */
.fc-terminal{background:#4a5568;color:#fff;border-radius:99px;padding:8px 28px;font-size:13px;font-weight:700;letter-spacing:.5px}
.fc-arrow-v{width:2px;height:28px;background:#a0aec0;position:relative;flex-shrink:0}
.fc-arrow-v::after{content:'';position:absolute;bottom:-6px;left:-5px;border:6px solid transparent;border-top-color:#a0aec0;border-bottom:none}

/* module block */
.fc-module-block{width:100%;border-radius:12px;overflow:hidden;box-shadow:0 4px 12px rgba(0,0,0,.5)}
.fc-module-label{padding:8px 16px;font-size:13px;font-weight:700;color:#fff;display:flex;align-items:center;gap:8px}
.fc-steps-col{background:#f7f8fc;border:2px solid;border-top:none;border-radius:0 0 10px 10px;display:flex;flex-direction:column;align-items:center;padding:12px 16px 4px}
.fc-step-box{width:100%;border-radius:8px;border:1.5px solid;padding:9px 14px;margin-bottom:8px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:10px}
.fc-step-box:hover{opacity:.85;transform:translateY(-1px)}
.fc-step-box .snum{font-size:11px;font-weight:700;padding:1px 7px;border-radius:4px;white-space:nowrap;flex-shrink:0}
.fc-step-box .sname{font-size:12px;font-weight:600;line-height:1.4;color:var(--text)}
.fc-step-box .risk-dot{width:8px;height:8px;border-radius:99px;flex-shrink:0;margin-left:auto}

/* inner arrow */
.fc-inner-arrow{width:2px;height:16px;background:#a0aec0;position:relative;flex-shrink:0;margin-bottom:8px}
.fc-inner-arrow::after{content:'';position:absolute;bottom:-5px;left:-4px;border:5px solid transparent;border-top-color:#a0aec0;border-bottom:none}

/* decision diamond */
.fc-decision-wrap{display:flex;flex-direction:column;align-items:center;width:100%;margin-bottom:8px}
.fc-diamond-row{display:flex;align-items:center;gap:0;width:100%}
.fc-diamond{width:56px;height:56px;background:var(--red-bg);border:2px solid var(--red);transform:rotate(45deg);flex-shrink:0;display:flex;align-items:center;justify-content:center;margin:0 12px}
.fc-diamond span{transform:rotate(-45deg);font-size:10px;font-weight:700;color:var(--red);text-align:center;line-height:1.3;white-space:nowrap}
.fc-branch{flex:1;display:flex;flex-direction:column;align-items:center}
.fc-branch-label{font-size:11px;font-weight:700;margin-bottom:6px}
.fc-branch-box{background:var(--red-bg);border:1.5px solid var(--red);border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600;color:var(--red);text-align:center}
.fc-join-line{width:100%;height:2px;background:#a0aec0;margin:8px 0}

/* module colors */
.mod-fi .fc-module-label{background:var(--c-fi)}
.mod-fi .fc-steps-col{border-color:var(--c-fi)}
.mod-fi .fc-step-box{border-color:#dd6b20;background:#fef3e2}
.mod-fi .fc-step-box .snum{background:#dd6b20;color:#fff}

.mod-bl .fc-module-label{background:var(--c-bl)}
.mod-bl .fc-steps-col{border-color:var(--c-bl)}
.mod-bl .fc-step-box{border-color:#3182ce;background:#ebf4ff}
.mod-bl .fc-step-box .snum{background:#3182ce;color:#fff}

.mod-fz .fc-module-label{background:var(--c-fz)}
.mod-fz .fc-steps-col{border-color:var(--c-fz)}
.mod-fz .fc-step-box{border-color:#e53e3e;background:#fff5f5}
.mod-fz .fc-step-box .snum{background:#e53e3e;color:#fff}

.mod-bu .fc-module-label{background:var(--c-bu)}
.mod-bu .fc-steps-col{border-color:var(--c-bu)}
.mod-bu .fc-step-box{border-color:#38a169;background:#f0fff4}
.mod-bu .fc-step-box .snum{background:#38a169;color:#fff}

.mod-tr .fc-module-label{background:var(--c-tr)}
.mod-tr .fc-steps-col{border-color:var(--c-tr)}
.mod-tr .fc-step-box{border-color:#805ad5;background:#faf5ff}
.mod-tr .fc-step-box .snum{background:#805ad5;color:#fff}

/* modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:9000;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal-box{background:#ffffff;border:1px solid #e2e8f0;border-radius:14px;padding:24px;width:460px;max-width:92vw;max-height:85vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.modal-box h3{font-size:15px;font-weight:700;margin-bottom:4px;color:var(--text)}
.modal-meta{font-size:12px;color:var(--sub);margin-bottom:14px}
.modal-row{font-size:13px;margin-bottom:10px;line-height:1.7;color:#4a5568}
.modal-row strong{font-weight:700}
.modal-close{float:right;background:none;border:none;font-size:18px;cursor:pointer;color:var(--sub);line-height:1}
.modal-close:hover{color:var(--text)}
.modal-kw{display:flex;flex-wrap:wrap;gap:4px;margin-top:10px}
.modal-kw span{background:#ebf4ff;color:var(--accent);border-radius:4px;padding:2px 8px;font-size:12px}
.modal-detail{font-size:12px;line-height:1.9;color:#4a5568;white-space:pre-line;background:#f7f8fc;border-radius:8px;padding:10px 12px;margin-top:6px;border-left:3px solid var(--accent)}
.detail-steps{font-size:12px;line-height:1.9;color:#4a5568;white-space:pre-line;background:#f7f8fc;border-radius:6px;padding:8px 10px;margin-bottom:6px;border-left:3px solid var(--accent)}

.footer{text-align:center;font-size:11px;color:var(--sub);padding:0 0 8px}
@media(max-width:600px){
  .header-top{flex-direction:column;align-items:flex-start;gap:8px}
  .container,.fc-wrap{padding:14px 10px 32px}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <h1>📋 BI SOP 作業流程指引</h1>
      <p>S-1572-BI-002 Ver.AN（2026/01/21）</p>
    </div>
    <div class="tab-bar">
      <button class="tab-btn active" id="tab-list" onclick="switchView('list')">☰ 清單</button>
      <button class="tab-btn" id="tab-flow" onclick="switchView('flow')">⬇ 流程圖</button>
    </div>
  </div>
</div>

<!-- ── CHECKLIST VIEW ── -->
<div class="view active" id="view-list">
  <div class="container">
    <div class="progress-wrap">
      <div class="progress-bar-bg"><div class="progress-bar" id="prog-bar" style="width:0%"></div></div>
      <span class="progress-text" id="prog-text">0 / 0 步驟</span>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:10px">
      <button class="toggle-all-btn" onclick="expandAll()">▼ 全部展開</button>
      <button class="toggle-all-btn" onclick="collapseAll()">▲ 全部收合</button>
    </div>
    <div id="modules"></div>
    <button class="reset-btn" onclick="resetAll()">↺ 重置所有勾選</button>
    <div class="footer" style="margin-top:16px">勾選狀態儲存於本機瀏覽器</div>
  </div>
</div>

<!-- ── FLOWCHART VIEW ── -->
<div class="view" id="view-flow">
  <div class="fc-wrap" id="fc-wrap"></div>
</div>

<!-- Detail Modal -->
<div class="modal-bg" id="modal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h3 id="m-name"></h3>
    <div class="modal-meta" id="m-meta"></div>
    <div class="modal-row" id="m-detail-wrap">
      <strong>📋 作業步驟：</strong>
      <div class="modal-detail" id="m-detail"></div>
    </div>
    <div class="modal-row"><strong style="color:var(--red)">⚠ 風險：</strong><span id="m-risk"></span></div>
    <div class="modal-row"><strong style="color:var(--green)">✓ 管控措施：</strong><span id="m-ctrl"></span></div>
    <div class="modal-kw" id="m-kw" style="display:none"></div>
  </div>
</div>

<script>
// ── 資料 ──────────────────────────────────────────
const MODULES = [
  {id:"dispatch", fcId:"fi", icon:"🔥", name:"排爐作業 Dispatch", color:"var(--c-fi)", cls:"mod-fi", steps:[
    {id:"fi-1", num:"Step 1", name:"確認 Run Card（BI 條件）",
     detail:"確認 Run Card 指示的 BI 條件（電壓、溫度、時間、程式）是否正確。",
     risk:"BI 條件錯誤，導致燒入錯誤溫度/時間/程式",
     control:"逐項確認 Run Card 上的電壓、溫度、時間與程式", highRisk:false},
    {id:"fi-2", num:"Step 2", name:"CIMES 拆批作業",
     detail:"1. 開啟 CPIS 首頁，登入 CIMES（帳密：BIT01）\n2. 選取 SPLT 功能\n3. 輸入工號、母批批號、分批批號、分批數量\n4. 點選確認",
     risk:"批號或數量輸入錯誤，導致帳務異常",
     control:"確認母批批號與分批批號正確，輸入正確數量後確認", highRisk:false},
    {id:"fi-3", num:"Step 3", name:"列印分批 Run Card",
     detail:"1. 點選分批發卡\n2. 選擇廠別與 Oper\n3. 點選確定\n4. 選擇批號\n5. 點選列印",
     risk:"Run Card 印錯，流通文件與實物不符",
     control:"列印前確認廠別、Oper 與批號正確", highRisk:false},
    {id:"fi-4", num:"Step 4", name:"CIMES 發料",
     detail:"1. 輸入工號\n2. 輸入站點\n3. 選取發料批號\n4. 點選確認",
     risk:"發料批號錯誤，帳務異常",
     control:"確認發料批號與實物相符後確認", highRisk:false},
    {id:"fi-5", num:"Step 5", name:"排爐系統列印流動文件",
     detail:"1. 選擇 BI dispatch，選擇廠別\n2. 輸入搜尋條件，點選 Load Data\n3. 選取批號，點選 Make Travel 文件\n4. 選擇 OVEN 與程式，選擇 LUL 程式\n5. 點選 OK → 點選開啟",
     risk:"流動文件條件錯誤，導致作業條件不符",
     control:"確認 OVEN 號與程式名稱正確後列印", highRisk:false},
    {id:"fi-6", num:"Step 6", name:"IC 分量與附文件",
     detail:"1. 找出作業批\n2. 確認 Run Card 批號正確\n3. 以雙手取放分量 IC\n4. 附上 Run Card 與流動文件",
     risk:"附錯文件造成混批；特殊 IC 未隔離隨貨流入",
     control:"雙手取放 IC；Run Card 與流動文件需一同附上", highRisk:false},
  ]},
  {id:"board-load", fcId:"bl", icon:"📥", name:"上板作業 Loading", color:"var(--c-bl)", cls:"mod-bl", steps:[
    {id:"bl-1", num:"Step 1", name:"預燒板（BIB）準備",
     detail:"依流動文件指定色帶將 BIB 準備好，至倉儲拿取閒置預燒板。\nBIB 色帶編碼：Yellow=Y；Purple=P；Blue=B",
     risk:"使用錯誤色帶 BIB，造成產品條件不符",
     control:"對照流動文件確認 BIB 色帶編碼", highRisk:false},
    {id:"bl-2", num:"Step 2", name:"確認流動文件（BI 條件）",
     detail:"確認 BI 流動文件上的型號、批號、數量及預燒條件（電壓、溫度、時間、程式），需與 Run Card 資料相符。",
     risk:"流動文件與 Run Card 不符，導致進錯批或錯誤條件",
     control:"確認 P/N、Lot no、Q'ty 與 Run Card 完全一致", highRisk:false},
    {id:"bl-3", num:"Step 3", name:"CIMES Move In（刷箱號確認批號）",
     detail:"1. 選擇 MVIN/MVOU，輸入批號，登入帳密：BIT01\n2. 輸入工號與機台號碼\n3. 刷取小 Run Card 下方箱號條碼\n   ⚠ 未刷取箱號有取錯別批黑箱的風險\n4. 確認各欄位資料後按 F7 確認\n   ⚠ 未確認基本資料會有 move 錯帳的情形",
     risk:"未刷箱號取錯別批黑箱，造成混批",
     control:"刷取小 Run Card 箱號條碼；確認各欄位後按 F7", highRisk:true},
    {id:"bl-4", num:"Step 4", name:"檢查預燒板測試插座",
     detail:"確認 BIB 使用正確色帶並檢查 Socket 有無損壞或異常。\n若有異常需將 BIB 狀態改為 DOWN 並送至維修間。\n⚠ 未確認 BIB 狀況，可能會用錯色帶或 IC 上到損壞 Socket 導致 LOSS 產生",
     risk:"用錯色帶或 IC 插入損壞 Socket 造成 IC loss",
     control:"確認 BIB 色帶正確且 Socket 無損，異常需送修板間", highRisk:true},
    {id:"bl-5", num:"Step 5", name:"檢查預燒板色塊",
     detail:"上板前確認 BIB 色塊標示是否清晰。\n若色塊不清需送修板間更新色塊。\n⚠ 未維護色塊，久了會退色，難以辨識",
     risk:"色塊退色難以辨識，使用錯誤 BIB",
     control:"確認色塊清晰可辨識，不清則送修更新", highRisk:false},
    {id:"bl-6", num:"Step 6", name:"清潔預燒板插座",
     detail:"BIB 置於工作桌 Socket 面朝下傾斜 60~80 度。\n以空氣槍由左至右、由上至下清潔。\n避免金手指碰觸工作桌。\n確認無雜物、金屬殘渣或殘留 IC。",
     risk:"BIB 插座殘留異物或 IC，造成污染與混料",
     control:"空氣槍清潔前後確認無殘留；金手指勿碰觸桌面", highRisk:false},
    {id:"bl-7", num:"Step 7", name:"檢查機台信號燈",
     detail:"確認機台狀態指示燈為黃燈（閒置）才可作業。\n燈號：綠燈=生產、黃燈=閒置、紅燈=中斷\n確認機台 ESD LED 燈正常。",
     risk:"機台非閒置狀態即開始作業，造成異常",
     control:"確認黃燈亮起且 ESD LED 正常後才作業", highRisk:false},
    {id:"bl-8", num:"Step 8", name:"檢查機台治具",
     detail:"確認機台治具是否與 Run Card 產品相符並清潔治具。",
     risk:"治具型號不符，IC 上板錯位",
     control:"對照 Run Card 確認治具型號並清潔", highRisk:false},
    {id:"bl-9", num:"Step 9", name:"確認 IC 數量",
     detail:"確認來貨數量與 Run Card 是否相符。",
     risk:"數量異常未發現，影響良率或造成 loss",
     control:"確認來貨數量與 Run Card 相符", highRisk:false},
    {id:"bl-10", num:"Step 10", name:"檢查 1 Tray（ID、Date Code、外觀）",
     detail:"檢查 1 Tray ID、Date Code 與外觀，記錄於 Run Card TYChkB 欄位。\n打勾標記來貨 Tray ID，使用整批一致的 Tray 盤。",
     risk:"Tray ID 或 Date Code 不符，混批風險",
     control:"確認 Tray ID 與 Date Code 符合 Run Card，並記錄", highRisk:false},

     detail:"正常品使用黃色 Run Card：\n1. 登入 Notes，點選編輯目前配置\n2. 點選郵件，輸入工號，儲存並關閉\n3. 開啟 Run card 系統，輸入 Notes 密碼\n4. 選擇「正常品發卡」，輸入批號，點選確定\n5. 選取 Route 或 Skip\n6. 點選 Next Step，選取欲列印站點\n7. 設定 By Lot 資訊後列印（黃色紙本）",
     risk:"Run Card 印錯顏色或站點，流向錯誤",
     control:"正常品用黃色 Run Card；確認站點後列印", highRisk:false},
    {id:"tr-4b", num:"Step 4-B", name:"列印 Run Card（工程品 SWR）",
     detail:"工程品使用紅色 Run Card：\n1. 點選「SWR 發卡」\n2. 點選設定 SWR ID\n3. 確認 Route No，點選設定 Next Step，選擇起始站點\n4. 點選設定 SWR Lot 資訊\n5. 點選列印（紅色紙本）",
     risk:"工程品用錯顏色或 Route，流向錯誤",
     control:"SWR 工程品用紅色 Run Card；確認 Route No", highRisk:false},
    {id:"tr-5", num:"Step 5", name:"CIMES 轉站",
     detail:"1. 輸入批號\n2. 輸入工號、選擇樓層、選取批號\n3. 完成後顯示訊息\n4. 系統自動產生移轉單，無需列印",
     risk:"轉站樓層或批號錯誤",
     control:"確認樓層與批號後轉站；系統自動產生移轉單", highRisk:false},
    {id:"tr-6", num:"Step 6", name:"實物轉站",
     detail:"確認 Run Card 下一站的機型，依樓層轉站。",
     risk:"實物送錯樓層或站點",
     control:"對照 Run Card 確認下一站機型後移送", highRisk:false},
    {id:"tr-7", num:"Step 7", name:"先行回貨轉 PK",
     detail:"1. 確認 Shipping mail、批號、站點、BIN 別與數量\n2. 確認回貨承載方式\n3. 至 Fail Control System 將帳指定站點至 IPK\n4. 實物轉移至 PK 站",
     risk:"回貨資訊錯誤，出貨品不符",
     control:"確認 Shipping mail 所有欄位；Fail Control 指定至 IPK", highRisk:false},
    {id:"tr-8", num:"Step 8", name:"FAIL Control 系統操作",
     detail:"1. CPIS 第 2 顆球 → Fail Control System\n2. 輸入批號與工號，點選查詢\n3. 勾選欲處理的站點/BIN 別，確認數量與廢料位置\n\n可用功能：\n· 拆批：將 BIN 別數量分拆\n· HOLD：改為扣留當站\n· RTL（隨貨走）：變更跟隨批號\n· 指定站點：移轉到指定站點\n· 出扣留庫房：狀態由扣留改為放行\n· 修改扣留資訊：修改扣留原因描述",
     risk:"Fail BIN 位置或數量設定錯誤",
     control:"確認數量與廢料位置正確後操作", highRisk:false},
  ]},
];

const TOTAL = MODULES.reduce((s,m)=>s+m.steps.length,0);
let checked = JSON.parse(localStorage.getItem('sop_checked')||'{}');

// ── View switch ──────────────────────────────────
function switchView(v){
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.getElementById('tab-'+v).classList.add('active');
  if(v==='flow' && !document.getElementById('fc-wrap').children.length) renderFlowchart();
}

// ════════════ CHECKLIST ════════════
function saveChecked(){ localStorage.setItem('sop_checked',JSON.stringify(checked)); }
function updateProgress(){
  const done=Object.values(checked).filter(Boolean).length;
  document.getElementById('prog-bar').style.width=Math.round(done/TOTAL*100)+'%';
  document.getElementById('prog-text').textContent=`${done} / ${TOTAL} 步驟`;
  MODULES.forEach(m=>{
    const badge=document.querySelector(`#mod-${m.id} .module-badge`);
    const mod=document.getElementById(`mod-${m.id}`);
    if(!badge)return;
    const cnt=m.steps.filter(s=>checked[s.id]).length;
    const all=cnt===m.steps.length;
    badge.textContent=all?'✓ 完成':`${cnt}/${m.steps.length}`;
    all?mod.classList.add('module-done'):mod.classList.remove('module-done');
  });
}
function toggleModule(id){ document.getElementById('mod-'+id).classList.toggle('open'); }
function expandAll(){
  MODULES.forEach(m=>{
    document.getElementById('mod-'+m.id).classList.add('open');
    m.steps.forEach(s=>{
      const el=document.getElementById('step-'+s.id);
      if(el){ el.classList.add('expanded'); el.querySelector('.expand-btn').textContent='▲ 收起'; }
    });
  });
}
function collapseAll(){
  MODULES.forEach(m=>{
    document.getElementById('mod-'+m.id).classList.remove('open');
    m.steps.forEach(s=>{
      const el=document.getElementById('step-'+s.id);
      if(el){ el.classList.remove('expanded'); el.querySelector('.expand-btn').textContent='▼ 展開詳細'; }
    });
  });
}
function toggleStep(id){
  const el=document.getElementById('step-'+id);
  checked[id]=!checked[id]; saveChecked();
  el.classList.toggle('checked',!!checked[id]);
  el.querySelector('.step-check').textContent=checked[id]?'✓':'';
  updateProgress();
}
function toggleExpand(id,e){
  e.stopPropagation();
  const el=document.getElementById('step-'+id);
  el.classList.toggle('expanded');
  el.querySelector('.expand-btn').textContent=el.classList.contains('expanded')?'▲ 收起':'▼ 展開詳細';
}
function resetAll(){
  if(!confirm('確定要重置所有勾選嗎？'))return;
  checked={}; saveChecked();
  document.querySelectorAll('.step').forEach(el=>{el.classList.remove('checked');el.querySelector('.step-check').textContent='';});
  updateProgress();
}
function renderChecklist(){
  document.getElementById('modules').innerHTML=MODULES.map(m=>`
    <div class="module" id="mod-${m.id}">
      <div class="module-header" onclick="toggleModule('${m.id}')">
        <span class="module-icon">${m.icon}</span>
        <div class="module-title"><h2>${m.name}</h2><span>${m.steps.length} 個步驟</span></div>
        <span class="module-badge">0/${m.steps.length}</span>
        <span class="module-arrow">▼</span>
      </div>
      <div class="steps">
        ${m.steps.map(s=>`
          <div class="step ${checked[s.id]?'checked':''}" id="step-${s.id}">
            <div class="step-check" onclick="toggleStep('${s.id}')">${checked[s.id]?'✓':''}</div>
            <div class="step-body">
              <div class="step-head" onclick="toggleStep('${s.id}')">
                <span class="step-num">${s.num}</span>
                <span class="step-name">${s.name}</span>
              </div>
              <span class="expand-btn" onclick="toggleExpand('${s.id}',event)">▼ 展開詳細</span>
              <div class="step-detail">
                ${s.detail?`<div class="detail-row"><span class="detail-lbl" style="color:var(--accent)">📋 步驟：</span></div><div class="detail-steps">${s.detail.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>`:''}
                <div class="detail-row"><span class="detail-lbl lbl-r">⚠ 風險：</span><span>${s.risk}</span></div>
                <div class="detail-row"><span class="detail-lbl lbl-g">✓ 管控：</span><span>${s.control}</span></div>
              </div>
            </div>
          </div>`).join('')}
      </div>
    </div>`).join('');
  updateProgress();
}

// ════════════ FLOWCHART ════════════
function openModal(stepId){
  let step=null, mod=null;
  MODULES.forEach(m=>{ const s=m.steps.find(s=>s.id===stepId); if(s){step=s;mod=m;} });
  if(!step)return;
  document.getElementById('m-name').textContent=step.name;
  document.getElementById('m-meta').textContent=`${mod.icon} ${mod.name}　${step.num}`;
  const dw=document.getElementById('m-detail-wrap');
  if(step.detail){
    document.getElementById('m-detail').textContent=step.detail;
    dw.style.display='';
  } else { dw.style.display='none'; }
  document.getElementById('m-risk').textContent=step.risk;
  document.getElementById('m-ctrl').textContent=step.control;
  document.getElementById('modal').classList.add('open');
}
function closeModal(){ document.getElementById('modal').classList.remove('open'); }
document.getElementById('modal').addEventListener('click',e=>{ if(e.target===document.getElementById('modal'))closeModal(); });

function arrowV(){ return '<div class="fc-arrow-v"></div>'; }
function innerArrow(){ return '<div class="fc-inner-arrow"></div>'; }

function renderFlowchart(){
  const wrap=document.getElementById('fc-wrap');
  let html='';

  // Start
  html+=`<div class="fc-terminal">開始</div>${arrowV()}`;

  MODULES.forEach((m,mi)=>{
    html+=`<div class="fc-module-block ${m.cls}" style="width:100%">
      <div class="fc-module-label">${m.icon} ${m.name}</div>
      <div class="fc-steps-col">`;

    m.steps.forEach((s,si)=>{
      const dot=s.highRisk?`<div class="risk-dot" style="background:var(--red)" title="高風險"></div>`:`<div class="risk-dot" style="background:#cbd5e0"></div>`;

      // Special: Pretest decision node
      if(s.id==='fz-8'){
        html+=`
          <div class="fc-step-box" onclick="openModal('${s.id}')">
            <span class="snum">${s.num}</span>
            <span class="sname">${s.name}</span>
            ${dot}
          </div>
          ${innerArrow()}
          <div class="fc-decision-wrap">
            <div style="font-size:11px;color:var(--sub);margin-bottom:4px;align-self:flex-start;margin-left:8px">判斷</div>
            <div style="display:flex;align-items:stretch;width:100%;gap:8px">
              <div style="flex:1;display:flex;flex-direction:column;align-items:center">
                <div style="font-size:11px;font-weight:700;color:var(--red);margin-bottom:4px">Fail 數量異常？</div>
                <div style="width:2px;height:16px;background:#742a2a"></div>
                <div class="fc-branch-box" style="width:100%">⛔ 停爐暫停<br>交換位置重測</div>
                <div style="width:2px;height:10px;background:#742a2a"></div>
                <div style="font-size:11px;color:var(--sub)">↓ Fail 歸零後繼續</div>
              </div>
              <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 4px">
                <div style="width:48px;height:48px;background:var(--red-bg);border:2px solid var(--red);transform:rotate(45deg);display:flex;align-items:center;justify-content:center">
                  <span style="transform:rotate(-45deg);font-size:10px;font-weight:700;color:var(--red)">Pass?</span>
                </div>
              </div>
              <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end">
                <div style="font-size:11px;font-weight:700;color:var(--green);margin-bottom:4px">正常 Pass</div>
                <div style="width:2px;height:16px;background:#1a5c30"></div>
                <div style="background:#0c1f14;border:1.5px solid #1a5c30;border-radius:8px;padding:6px 10px;font-size:12px;font-weight:600;color:var(--green);width:100%;text-align:center">✓ 啟動<br>Burn-In</div>
              </div>
            </div>
          </div>
          ${si<m.steps.length-1?innerArrow():''}`;
      } else {
        html+=`<div class="fc-step-box" onclick="openModal('${s.id}')">
          <span class="snum">${s.num}</span>
          <span class="sname">${s.name}</span>
          ${dot}
        </div>`;
        if(si<m.steps.length-1) html+=innerArrow();
      }
    });

    html+='</div></div>';
    if(mi<MODULES.length-1) html+=arrowV();
  });

  html+=`${arrowV()}<div class="fc-terminal">完成 ✓</div>`;

  // Legend
  html+=`<div style="margin-top:24px;background:#1a1d2e;border-radius:10px;padding:14px 18px;width:100%;border:1px solid #2d3748;font-size:12px;color:#a0aec0">
    <div style="font-weight:700;margin-bottom:8px;color:#e2e8f0">圖例</div>
    <div style="display:flex;gap:16px;flex-wrap:wrap">
      <span><span style="display:inline-block;width:10px;height:10px;border-radius:99px;background:var(--red);vertical-align:middle;margin-right:4px"></span>高風險步驟</span>
      <span><span style="display:inline-block;width:10px;height:10px;border-radius:99px;background:#4a5568;vertical-align:middle;margin-right:4px"></span>一般步驟</span>
      <span>點擊步驟 → 查看風險與管控措施</span>
    </div>
  </div>`;

  wrap.innerHTML=html;
}

// ── Init ─────────────────────────────────────────
renderChecklist();
</script>
</body>
</html>
